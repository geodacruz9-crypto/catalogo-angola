<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Painel do Vendedor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1B33;
    --surface:#1B2C4F;
    --surface-2:#233865;
    --gold:#E3A24B;
    --gold-dim:#B9832F;
    --red:#B33A3A;
    --green:#3FA66B;
    --text:#F5F1E8;
    --text-muted:#9FADC7;
    --whatsapp:#25D366;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:80px;
  }

  /* ---------- LOGIN ---------- */
  #tela-login{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:24px;
  }
  .login-topo{ text-align:center; margin-bottom:36px; }
  .login-titulo{
    font-family:'Archivo Black', sans-serif;
    font-size:24px;
    text-transform:uppercase;
    color:var(--gold);
  }
  .login-sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--text-muted);
    margin-top:6px;
    letter-spacing:0.5px;
  }
  .login-form input{
    width:100%;
    background:var(--surface);
    border:1px solid rgba(255,255,255,0.1);
    color:var(--text);
    padding:14px;
    border-radius:10px;
    font-size:15px;
    margin-bottom:14px;
    font-family:'Inter', sans-serif;
  }
  .login-form input:focus{ outline:2px solid var(--gold); border-color:transparent; }
  .login-btn{
    width:100%;
    background:var(--gold);
    color:var(--bg);
    border:none;
    padding:15px;
    border-radius:10px;
    font-weight:700;
    font-size:15px;
    margin-top:6px;
  }
  .login-erro{
    color:var(--red);
    font-size:13px;
    text-align:center;
    margin-top:12px;
    display:none;
  }

  /* ---------- APP ---------- */
  #app{ display:none; }

  header{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    color:var(--bg);
    padding:22px 20px 18px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }
  .loja-nome{
    font-family:'Archivo Black', sans-serif;
    font-size:22px;
    text-transform:uppercase;
  }
  .loja-sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    opacity:0.7;
    margin-top:4px;
  }
  #btn-logout{
    background:rgba(15,27,51,0.15);
    border:none;
    color:var(--bg);
    padding:8px 12px;
    border-radius:8px;
    font-size:12px;
    font-weight:700;
    font-family:'IBM Plex Mono', monospace;
  }

  /* Resumo do dia */
  .resumo{
    display:flex;
    gap:10px;
    padding:16px;
  }
  .resumo-card{
    flex:1;
    background:var(--surface);
    border-radius:12px;
    padding:14px 12px;
    text-align:center;
  }
  .resumo-valor{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:18px;
    color:var(--gold);
  }
  .resumo-label{
    font-size:10.5px;
    color:var(--text-muted);
    margin-top:4px;
    text-transform:uppercase;
    letter-spacing:0.4px;
  }

  /* Abas */
  .abas{
    display:flex;
    padding:0 16px;
    gap:8px;
    margin-bottom:6px;
  }
  .aba-btn{
    flex:1;
    background:none;
    border:none;
    color:var(--text-muted);
    padding:10px;
    font-weight:600;
    font-size:13.5px;
    border-bottom:2px solid transparent;
  }
  .aba-btn.ativa{
    color:var(--gold);
    border-bottom-color:var(--gold);
  }

  main{ padding:12px 16px; max-width:560px; margin:0 auto; }
  .secao{ display:none; }
  .secao.ativa{ display:block; }
  .estado-vazio{
    text-align:center;
    color:var(--text-muted);
    padding:50px 20px;
    font-size:14px;
  }

  /* Cartões de pedido */
  .pedido{
    background:var(--surface);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:12px;
    border:1px solid rgba(255,255,255,0.05);
  }
  .pedido-topo{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:8px;
  }
  .pedido-cliente{ font-weight:700; font-size:15px; }
  .pedido-tel{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--text-muted);
    margin-top:2px;
  }
  .pedido-total{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    color:var(--gold);
    font-size:15px;
  }
  .status-tag{
    display:inline-block;
    font-size:10.5px;
    font-family:'IBM Plex Mono', monospace;
    padding:3px 8px;
    border-radius:6px;
    text-transform:uppercase;
    margin-top:6px;
    font-weight:600;
  }
  .status-pendente{ background:rgba(227,162,75,0.18); color:var(--gold); }
  .status-confirmado{ background:rgba(63,166,107,0.18); color:var(--green); }
  .status-entregue{ background:rgba(159,173,199,0.18); color:var(--text-muted); }
  .status-cancelado{ background:rgba(179,58,58,0.18); color:var(--red); }

  .pedido-itens{
    border-top:1px dashed rgba(255,255,255,0.1);
    margin-top:10px;
    padding-top:10px;
    font-size:13px;
    color:var(--text-muted);
  }
  .pedido-item-linha{ display:flex; justify-content:space-between; padding:2px 0; }

  .pedido-acoes{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .pedido-acoes button{
    flex:1;
    padding:9px;
    border-radius:8px;
    border:none;
    font-size:12.5px;
    font-weight:700;
    font-family:'Inter', sans-serif;
  }
  .btn-confirmar{ background:var(--green); color:#fff; }
  .btn-entregue{ background:var(--surface-2); color:var(--text); }
  .btn-cancelar{ background:none; color:var(--red); border:1px solid rgba(179,58,58,0.4) !important; }
  .btn-whatsapp{ background:var(--whatsapp); color:#fff; }

  /* Cartões de produto */
  .produto-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .produto-card-nome{ font-weight:600; font-size:14.5px; }
  .produto-card-preco{
    font-family:'IBM Plex Mono', monospace;
    color:var(--gold);
    font-size:13px;
    margin-top:3px;
  }
  .stock-editor{
    display:flex;
    align-items:center;
    gap:6px;
    flex-shrink:0;
  }
  .stock-input{
    width:52px;
    background:var(--surface-2);
    border:1px solid rgba(255,255,255,0.1);
    color:var(--text);
    padding:8px 6px;
    border-radius:8px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
  }
  .stock-label{ font-size:10px; color:var(--text-muted); text-align:center; margin-top:2px; }
  .stock-baixo{ color:var(--red) !important; }

  .btn-flutuante{
    position:fixed;
    bottom:20px; right:20px;
    width:56px; height:56px;
    background:var(--gold);
    color:var(--bg);
    border:none;
    border-radius:50%;
    font-size:28px;
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
    z-index:40;
  }

  /* Modal produto novo */
  .overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:flex-end;
    z-index:100;
  }
  .overlay.ativa{ display:flex; }
  .modal{
    background:var(--surface);
    width:100%;
    border-radius:20px 20px 0 0;
    padding:24px 20px 28px;
    max-height:85vh;
    overflow-y:auto;
  }
  .modal h3{
    font-family:'Archivo Black', sans-serif;
    font-size:17px;
    margin-bottom:16px;
    text-transform:uppercase;
    color:var(--gold);
  }
  .modal label{
    display:block;
    font-size:12px;
    color:var(--text-muted);
    margin-bottom:6px;
    font-family:'IBM Plex Mono', monospace;
  }
  .modal input, .modal textarea{
    width:100%;
    background:var(--surface-2);
    border:1px solid rgba(255,255,255,0.1);
    color:var(--text);
    padding:12px;
    border-radius:8px;
    font-size:15px;
    margin-bottom:14px;
    font-family:'Inter', sans-serif;
  }
  .modal-btns{ display:flex; gap:10px; }
  .modal-cancelar{
    flex:1;
    background:none;
    border:1px solid rgba(255,255,255,0.15);
    color:var(--text-muted);
    padding:13px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
  }
  .modal-confirmar{
    flex:2;
    background:var(--gold);
    border:none;
    color:var(--bg);
    padding:13px;
    border-radius:10px;
    font-size:14px;
    font-weight:700;
  }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="tela-login">
  <div class="login-topo">
    <div class="login-titulo">Painel do Vendedor</div>
    <div class="login-sub">ENTRA COM A TUA CONTA</div>
  </div>
  <div class="login-form">
    <input type="email" id="login-email" placeholder="Email" autocomplete="username">
    <input type="password" id="login-senha" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" id="btn-login">Entrar</button>
    <div class="login-erro" id="login-erro">Email ou password incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <div class="loja-nome" id="loja-nome">Loja</div>
      <div class="loja-sub" id="data-hoje"></div>
    </div>
    <button id="btn-logout">Sair</button>
  </header>

  <div class="resumo">
    <div class="resumo-card">
      <div class="resumo-valor" id="resumo-pendentes">0</div>
      <div class="resumo-label">Pendentes</div>
    </div>
    <div class="resumo-card">
      <div class="resumo-valor" id="resumo-vendido">0 Kz</div>
      <div class="resumo-label">Total do mês</div>
    </div>
  </div>

  <div class="abas">
    <button class="aba-btn ativa" data-aba="pedidos">Pedidos</button>
    <button class="aba-btn" data-aba="produtos">Produtos</button>
  </div>

  <main>
    <section class="secao ativa" id="secao-pedidos">
      <div id="lista-pedidos" class="estado-vazio">A carregar…</div>
    </section>

    <section class="secao" id="secao-produtos">
      <div id="lista-produtos" class="estado-vazio">A carregar…</div>
    </section>
  </main>

  <button class="btn-flutuante" id="btn-novo-produto">+</button>
</div>

<!-- MODAL: novo produto -->
<div class="overlay" id="overlay-produto">
  <div class="modal">
    <h3>Novo produto</h3>
    <label>Foto (opcional)</label>
    <input type="file" id="np-foto" accept="image/*" capture="environment">
    <label>Nome</label>
    <input type="text" id="np-nome" placeholder="Ex: Saco de arroz 5kg">
    <label>Descrição (opcional)</label>
    <textarea id="np-desc" rows="2" placeholder="Detalhes curtos"></textarea>
    <label>Preço (Kz)</label>
    <input type="number" id="np-preco" placeholder="0" inputmode="numeric">
    <label>Quantidade em stock</label>
    <input type="number" id="np-stock" placeholder="0" inputmode="numeric">
    <div class="modal-btns">
      <button class="modal-cancelar" id="np-cancelar">Cancelar</button>
      <button class="modal-confirmar" id="np-confirmar">Guardar produto</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://gshyiqgjsitctzdxmhnm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzaHlpcWdqc2l0Y3R6ZHhtaG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NDEzMDQsImV4cCI6MjEwMDExNzMwNH0.ebJb-MEA-IEXdbdd_rCLG4YHbQuv2zvWUQR0SItf83E';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let vendedor = null;
let produtos = [];
let pedidos = [];

function formatarKz(v){
  return new Intl.NumberFormat('pt-AO', { maximumFractionDigits: 0 }).format(v) + ' Kz';
}

// ---------- LOGIN ----------
document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const erroEl = document.getElementById('login-erro');
  erroEl.style.display = 'none';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });
  if (error){
    erroEl.style.display = 'block';
    return;
  }
  await iniciarApp();
});

document.getElementById('btn-logout').addEventListener('click', async () => {
  await supabase.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('tela-login').style.display = 'flex';
});

async function verificarSessao(){
  const { data: { session } } = await supabase.auth.getSession();
  if (session){
    await iniciarApp();
  }
}

async function iniciarApp(){
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return;

  const { data: vendedores, error } = await supabase
    .from('vendedores')
    .select('*')
    .eq('user_id', user.id)
    .limit(1);

  if (error || !vendedores || vendedores.length === 0){
    alert('Esta conta não está associada a nenhuma loja.');
    await supabase.auth.signOut();
    return;
  }

  vendedor = vendedores[0];
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('loja-nome').textContent = vendedor.nome_loja;
  document.getElementById('data-hoje').textContent = new Date().toLocaleDateString('pt-AO', { weekday:'long', day:'numeric', month:'long' });

  await carregarPedidos();
  await carregarProdutos();
}

// ---------- ABAS ----------
document.querySelectorAll('.aba-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('ativa'));
    document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
    btn.classList.add('ativa');
    document.getElementById('secao-' + btn.dataset.aba).classList.add('ativa');
  });
});

// ---------- PEDIDOS ----------
async function carregarPedidos(){
  const { data, error } = await supabase
    .from('pedidos')
    .select('*, pedido_itens(*, produtos(nome))')
    .eq('vendedor_id', vendedor.id)
    .order('criado_em', { ascending: false });

  if (error || !data){
    document.getElementById('lista-pedidos').textContent = 'Erro ao carregar pedidos.';
    return;
  }

  pedidos = data;
  renderizarPedidos();
  atualizarResumo();
}

function renderizarPedidos(){
  const container = document.getElementById('lista-pedidos');
  if (pedidos.length === 0){
    container.className = 'estado-vazio';
    container.textContent = 'Ainda não há pedidos.';
    return;
  }
  container.className = '';
  container.innerHTML = '';

  pedidos.forEach(p => {
    const div = document.createElement('div');
    div.className = 'pedido';

    const itensHtml = (p.pedido_itens || []).map(item => `
      <div class="pedido-item-linha">
        <span>${item.quantidade}x ${item.produtos?.nome || 'produto'}</span>
        <span>${formatarKz(item.preco_unitario * item.quantidade)}</span>
      </div>
    `).join('');

    const telLimpo = p.telefone_cliente.replace(/\D/g, '');

    let botoesAcao = '';
    if (p.status === 'pendente'){
      botoesAcao = `
        <button class="btn-confirmar" data-acao="confirmado" data-id="${p.id}">Confirmar</button>
        <button class="btn-cancelar" data-acao="cancelado" data-id="${p.id}">Cancelar</button>
      `;
    } else if (p.status === 'confirmado'){
      botoesAcao = `<button class="btn-entregue" data-acao="entregue" data-id="${p.id}">Marcar entregue</button>`;
    }

    div.innerHTML = `
      <div class="pedido-topo">
        <div>
          <div class="pedido-cliente">${p.nome_cliente}</div>
          <div class="pedido-tel">${p.telefone_cliente}</div>
        </div>
        <div class="pedido-total">${formatarKz(p.total)}</div>
      </div>
      <span class="status-tag status-${p.status}">${p.status}</span>
      <div class="pedido-itens">${itensHtml}</div>
      <div class="pedido-acoes">
        ${botoesAcao}
        <button class="btn-whatsapp" onclick="window.open('https://wa.me/${telLimpo}', '_blank')">WhatsApp</button>
      </div>
    `;
    container.appendChild(div);
  });

  container.querySelectorAll('[data-acao]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const novoStatus = btn.dataset.acao;
      const id = btn.dataset.id;
      const { error } = await supabase.from('pedidos').update({ status: novoStatus }).eq('id', id);
      if (error){
        alert('Não foi possível atualizar o pedido.');
        return;
      }
      await carregarPedidos();
    });
  });
}

function atualizarResumo(){
  const pendentes = pedidos.filter(p => p.status === 'pendente').length;
  const agora = new Date();
  const totalMes = pedidos
    .filter(p => {
      const d = new Date(p.criado_em);
      return p.status !== 'cancelado' && d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
    })
    .reduce((soma, p) => soma + Number(p.total), 0);

  document.getElementById('resumo-pendentes').textContent = pendentes;
  document.getElementById('resumo-vendido').textContent = formatarKz(totalMes);
}

// ---------- PRODUTOS ----------
async function carregarProdutos(){
  const { data, error } = await supabase
    .from('produtos')
    .select('*')
    .eq('vendedor_id', vendedor.id)
    .order('criado_em', { ascending: false });

  if (error || !data){
    document.getElementById('lista-produtos').textContent = 'Erro ao carregar produtos.';
    return;
  }

  produtos = data;
  renderizarProdutos();
}

function renderizarProdutos(){
  const container = document.getElementById('lista-produtos');
  if (produtos.length === 0){
    container.className = 'estado-vazio';
    container.textContent = 'Ainda não tens produtos. Toca no botão + para adicionar.';
    return;
  }
  container.className = '';
  container.innerHTML = '';

  produtos.forEach(p => {
    const div = document.createElement('div');
    div.className = 'produto-card';
    div.innerHTML = `
      <div style="display:flex; align-items:center; gap:10px; flex:1; min-width:0;">
        ${p.imagem_url ? `<img src="${p.imagem_url}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;">` : ''}
        <div style="min-width:0;">
          <div class="produto-card-nome">${p.nome}</div>
          <div class="produto-card-preco">${formatarKz(p.preco)}</div>
        </div>
      </div>
      <div>
        <div class="stock-editor">
          <input type="number" class="stock-input ${p.quantidade_stock <= 3 ? 'stock-baixo' : ''}" value="${p.quantidade_stock}" data-id="${p.id}" inputmode="numeric">
        </div>
        <div class="stock-label">stock</div>
      </div>
    `;
    container.appendChild(div);
  });

  container.querySelectorAll('.stock-input').forEach(input => {
    input.addEventListener('change', async () => {
      const novoValor = parseInt(input.value) || 0;
      const id = input.dataset.id;
      const { error } = await supabase.from('produtos').update({ quantidade_stock: novoValor }).eq('id', id);
      if (error){
        alert('Não foi possível atualizar o stock.');
        return;
      }
      input.classList.toggle('stock-baixo', novoValor <= 3);
    });
  });
}

// ---------- NOVO PRODUTO ----------
document.getElementById('btn-novo-produto').addEventListener('click', () => {
  document.getElementById('overlay-produto').classList.add('ativa');
});
document.getElementById('np-cancelar').addEventListener('click', () => {
  document.getElementById('overlay-produto').classList.remove('ativa');
});
document.getElementById('np-confirmar').addEventListener('click', async () => {
  const nome = document.getElementById('np-nome').value.trim();
  const desc = document.getElementById('np-desc').value.trim();
  const preco = parseFloat(document.getElementById('np-preco').value);
  const stock = parseInt(document.getElementById('np-stock').value) || 0;
  const ficheiroFoto = document.getElementById('np-foto').files[0];

  if (!nome || !preco){
    alert('Preenche pelo menos o nome e o preço.');
    return;
  }

  const btnConfirmar = document.getElementById('np-confirmar');
  btnConfirmar.textContent = 'A guardar…';
  btnConfirmar.disabled = true;

  let imagemUrl = null;

  if (ficheiroFoto){
    const extensao = ficheiroFoto.name.split('.').pop();
    const caminho = `${vendedor.id}/${crypto.randomUUID()}.${extensao}`;

    const { error: erroUpload } = await supabase.storage
      .from('produtos-imagens')
      .upload(caminho, ficheiroFoto);

    if (erroUpload){
      alert('Não foi possível enviar a foto. O produto vai ser guardado sem foto.');
    } else {
      const { data: urlData } = supabase.storage
        .from('produtos-imagens')
        .getPublicUrl(caminho);
      imagemUrl = urlData.publicUrl;
    }
  }

  const { error } = await supabase.from('produtos').insert({
    vendedor_id: vendedor.id,
    nome, descricao: desc || null,
    preco, quantidade_stock: stock,
    imagem_url: imagemUrl
  });

  btnConfirmar.textContent = 'Guardar produto';
  btnConfirmar.disabled = false;

  if (error){
    alert('Não foi possível guardar o produto.');
    return;
  }

  document.getElementById('overlay-produto').classList.remove('ativa');
  document.getElementById('np-nome').value = '';
  document.getElementById('np-desc').value = '';
  document.getElementById('np-preco').value = '';
  document.getElementById('np-stock').value = '';
  document.getElementById('np-foto').value = '';
  await carregarProdutos();
});

verificarSessao();
</script>

</body>
</html>
