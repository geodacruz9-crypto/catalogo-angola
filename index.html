<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Catálogo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E3A24B">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1B33;
    --surface:#1B2C4F;
    --surface-2:#233865;
    --gold:#E3A24B;
    --gold-dim:#B9832F;
    --red:#B33A3A;
    --text:#F5F1E8;
    --text-muted:#9FADC7;
    --whatsapp:#25D366;
    --whatsapp-dark:#1DA851;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    padding-bottom:100px;
    min-height:100vh;
  }
  ::selection{ background:var(--gold); color:var(--bg); }

  /* Cabeçalho - tabuleta de banca de mercado */
  header{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    color:var(--bg);
    padding:28px 20px 24px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:'';
    position:absolute;
    bottom:0; left:0; right:0;
    height:6px;
    background:repeating-linear-gradient(90deg, var(--bg) 0 10px, transparent 10px 20px);
    opacity:0.15;
  }
  .loja-nome{
    font-family:'Archivo Black', sans-serif;
    font-size:28px;
    line-height:1.05;
    letter-spacing:-0.5px;
    text-transform:uppercase;
  }
  .loja-sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    font-weight:600;
    margin-top:6px;
    opacity:0.75;
    letter-spacing:0.5px;
  }

  main{ padding:20px 16px; max-width:520px; margin:0 auto; }

  .estado{
    text-align:center;
    padding:60px 20px;
    color:var(--text-muted);
    font-size:14px;
  }

  /* Grelha de produtos */
  .produtos{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .produto{
    background:var(--surface);
    border-radius:var(--radius);
    padding:14px;
    display:flex;
    gap:14px;
    align-items:center;
    border:1px solid rgba(255,255,255,0.05);
  }
  .produto-img{
    width:76px; height:76px;
    border-radius:10px;
    background:var(--surface-2);
    flex-shrink:0;
    object-fit:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-muted);
    font-size:11px;
  }
  .produto-info{ flex:1; min-width:0; }
  .produto-nome{
    font-weight:600;
    font-size:15px;
    line-height:1.3;
  }
  .produto-desc{
    color:var(--text-muted);
    font-size:12.5px;
    margin-top:2px;
    line-height:1.4;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .produto-preco{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:14px;
    color:var(--gold);
    margin-top:6px;
  }
  .produto-stock-baixo{
    color:var(--red);
    font-size:11px;
    font-family:'IBM Plex Mono', monospace;
    margin-top:2px;
  }

  .qtd-control{
    display:flex;
    align-items:center;
    gap:0;
    background:var(--surface-2);
    border-radius:8px;
    flex-shrink:0;
    overflow:hidden;
  }
  .qtd-btn{
    width:32px; height:32px;
    background:none;
    border:none;
    color:var(--text);
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .qtd-btn:active{ background:rgba(255,255,255,0.1); }
  .qtd-valor{
    width:26px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:14px;
  }

  /* Talão / carrinho flutuante — o elemento assinatura */
  .talao{
    position:fixed;
    bottom:0; left:0; right:0;
    background:var(--text);
    color:var(--bg);
    border-radius:20px 20px 0 0;
    padding:16px 18px 20px;
    box-shadow:0 -8px 24px rgba(0,0,0,0.35);
    transform:translateY(110%);
    transition:transform 0.3s ease;
    z-index:50;
  }
  .talao.ativo{ transform:translateY(0); }
  .talao-linha-topo{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom:1px dashed rgba(15,27,51,0.25);
    padding-bottom:10px;
    margin-bottom:10px;
  }
  .talao-titulo{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    opacity:0.6;
  }
  .talao-total{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:20px;
  }
  .talao-btn{
    width:100%;
    background:var(--whatsapp);
    color:#fff;
    border:none;
    padding:14px;
    border-radius:10px;
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .talao-btn:active{ background:var(--whatsapp-dark); }

  /* Modal de dados do cliente */
  .overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:flex-end;
    z-index:100;
  }
  .overlay.ativo{ display:flex; }
  .modal{
    background:var(--surface);
    width:100%;
    border-radius:20px 20px 0 0;
    padding:24px 20px 28px;
  }
  .modal h3{
    font-family:'Archivo Black', sans-serif;
    font-size:18px;
    margin-bottom:16px;
    text-transform:uppercase;
  }
  .modal label{
    display:block;
    font-size:12px;
    color:var(--text-muted);
    margin-bottom:6px;
    font-family:'IBM Plex Mono', monospace;
  }
  .modal input{
    width:100%;
    background:var(--surface-2);
    border:1px solid rgba(255,255,255,0.1);
    color:var(--text);
    padding:12px;
    border-radius:8px;
    font-size:15px;
    margin-bottom:16px;
    font-family:'Inter', sans-serif;
  }
  .modal input:focus{ outline:2px solid var(--gold); border-color:transparent; }
  .modal-btns{ display:flex; gap:10px; }
  .modal-cancelar{
    flex:1;
    background:none;
    border:1px solid rgba(255,255,255,0.15);
    color:var(--text-muted);
    padding:13px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
  }
  .modal-confirmar{
    flex:2;
    background:var(--whatsapp);
    border:none;
    color:#fff;
    padding:13px;
    border-radius:10px;
    font-size:14px;
    font-weight:700;
  }

  @media (prefers-reduced-motion: reduce){
    .talao{ transition:none; }
  }

  /* Aviso estilizado, substitui o alert() feio do navegador */
  #toast{
    position:fixed;
    top:16px; left:16px; right:16px;
    background:var(--surface);
    border:1px solid rgba(227,162,75,0.3);
    border-left:4px solid var(--gold);
    color:var(--text);
    padding:14px 16px;
    border-radius:10px;
    font-size:14px;
    line-height:1.4;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
    z-index:200;
    transform:translateY(-120%);
    transition:transform 0.25s ease;
    max-width:520px;
    margin:0 auto;
  }
  #toast.ativo{ transform:translateY(0); }
  #toast.erro{ border-left-color:var(--red); }

  /* Link "ver o meu pedido" no cabeçalho */
  .link-consulta{
    background:rgba(15,27,51,0.12);
    border:none;
    color:var(--bg);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    font-weight:600;
    padding:7px 11px;
    border-radius:8px;
    margin-top:10px;
    display:inline-block;
  }

  /* Modal de consulta de estado */
  .status-tag{
    display:inline-block;
    font-size:10.5px;
    font-family:'IBM Plex Mono', monospace;
    padding:3px 8px;
    border-radius:6px;
    text-transform:uppercase;
    font-weight:600;
  }
  .status-pendente{ background:rgba(227,162,75,0.18); color:var(--gold); }
  .status-confirmado{ background:rgba(63,166,107,0.18); color:#3FA66B; }
  .status-entregue{ background:rgba(159,173,199,0.18); color:var(--text-muted); }
  .status-cancelado{ background:rgba(179,58,58,0.18); color:var(--red); }

  .pedido-consultado{
    background:var(--surface-2);
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
  }
  .pedido-consultado-topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
  }
  .pedido-consultado-data{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--text-muted);
  }
  .pedido-consultado-total{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    color:var(--gold);
    font-size:14px;
  }
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="loja-nome" id="loja-nome">A carregar…</div>
  <div class="loja-sub" id="loja-sub">CATÁLOGO DIGITAL</div>
  <button class="link-consulta" id="btn-abrir-consulta">Ver o estado do meu pedido</button>
</header>

<main>
  <div id="conteudo" class="estado">A carregar produtos…</div>
</main>

<div class="talao" id="talao">
  <div class="talao-linha-topo">
    <span class="talao-titulo">Total do pedido</span>
    <span class="talao-total" id="talao-total">0 Kz</span>
  </div>
  <button class="talao-btn" id="btn-pedir">
    Fazer pedido via WhatsApp
  </button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Os teus dados</h3>
    <label for="input-nome">Nome</label>
    <input type="text" id="input-nome" placeholder="O teu nome">
    <label for="input-tel">Telefone (WhatsApp)</label>
    <input type="tel" id="input-tel" placeholder="9XX XXX XXX">
    <div class="modal-btns">
      <button class="modal-cancelar" id="btn-cancelar">Cancelar</button>
      <button class="modal-confirmar" id="btn-confirmar">Confirmar pedido</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay-consulta">
  <div class="modal">
    <h3>O estado do meu pedido</h3>
    <label for="input-tel-consulta">O telefone que usaste no pedido</label>
    <input type="tel" id="input-tel-consulta" placeholder="9XX XXX XXX">
    <div class="modal-btns">
      <button class="modal-cancelar" id="btn-cancelar-consulta">Fechar</button>
      <button class="modal-confirmar" id="btn-consultar">Consultar</button>
    </div>
    <div id="resultado-consulta" style="margin-top:16px;"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ---- LIGAÇÃO AO SUPABASE ----
const SUPABASE_URL = 'https://gshyiqgjsitctzdxmhnm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzaHlpcWdqc2l0Y3R6ZHhtaG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NDEzMDQsImV4cCI6MjEwMDExNzMwNH0.ebJb-MEA-IEXdbdd_rCLG4YHbQuv2zvWUQR0SItf83E';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let vendedor = null;
let produtos = [];
let carrinho = {}; // { produto_id: quantidade }

let toastTimeout;
function mostrarAviso(mensagem, tipo = 'aviso'){
  const toast = document.getElementById('toast');
  toast.textContent = mensagem;
  toast.className = tipo === 'erro' ? 'erro ativo' : 'ativo';
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('ativo'), 3800);
}

function formatarKz(valor){
  return new Intl.NumberFormat('pt-AO', { maximumFractionDigits: 0 }).format(valor) + ' Kz';
}

async function carregar(){
  const { data: vendedores, error: erroVendedor } = await supabase
    .from('vendedores')
    .select('*')
    .limit(1);

  if (erroVendedor || !vendedores || vendedores.length === 0){
    document.getElementById('conteudo').textContent = 'Nenhuma loja encontrada.';
    return;
  }

  vendedor = vendedores[0];
  document.getElementById('loja-nome').textContent = vendedor.nome_loja;
  document.getElementById('loja-sub').textContent = 'CATÁLOGO DIGITAL · PEDIDOS VIA WHATSAPP';

  const { data: produtosData, error: erroProdutos } = await supabase
    .from('produtos')
    .select('*')
    .eq('vendedor_id', vendedor.id)
    .eq('ativo', true)
    .order('criado_em', { ascending: false });

  if (erroProdutos || !produtosData || produtosData.length === 0){
    document.getElementById('conteudo').textContent = 'Ainda não há produtos neste catálogo.';
    return;
  }

  produtos = produtosData;
  renderizarProdutos();
}

function renderizarProdutos(){
  const container = document.getElementById('conteudo');
  container.className = 'produtos';
  container.innerHTML = '';

  produtos.forEach(p => {
    const qtd = carrinho[p.id] || 0;
    const semStock = p.quantidade_stock <= 0;
    const stockBaixo = p.quantidade_stock > 0 && p.quantidade_stock <= 3;

    const div = document.createElement('div');
    div.className = 'produto';
    div.innerHTML = `
      <div class="produto-img">${p.imagem_url ? `<img src="${p.imagem_url}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">` : 'sem foto'}</div>
      <div class="produto-info">
        <div class="produto-nome">${p.nome}</div>
        ${p.descricao ? `<div class="produto-desc">${p.descricao}</div>` : ''}
        <div class="produto-preco">${formatarKz(p.preco)}</div>
        ${semStock ? `<div class="produto-stock-baixo">Esgotado</div>` : stockBaixo ? `<div class="produto-stock-baixo">Só ${p.quantidade_stock} em stock</div>` : ''}
      </div>
      ${!semStock ? `
      <div class="qtd-control">
        <button class="qtd-btn" data-acao="menos" data-id="${p.id}">–</button>
        <span class="qtd-valor" id="qtd-${p.id}">${qtd}</span>
        <button class="qtd-btn" data-acao="mais" data-id="${p.id}">+</button>
      </div>` : ''}
    `;
    container.appendChild(div);
  });

  container.querySelectorAll('.qtd-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const acao = btn.dataset.acao;
      const produto = produtos.find(p => p.id === id);
      let atual = carrinho[id] || 0;

      if (acao === 'mais' && atual < produto.quantidade_stock){
        atual++;
      } else if (acao === 'menos' && atual > 0){
        atual--;
      }
      carrinho[id] = atual;
      document.getElementById(`qtd-${id}`).textContent = atual;
      atualizarTalao();
    });
  });
}

function atualizarTalao(){
  const itens = Object.entries(carrinho).filter(([_, q]) => q > 0);
  const total = itens.reduce((soma, [id, q]) => {
    const produto = produtos.find(p => p.id === id);
    return soma + (produto.preco * q);
  }, 0);

  const talao = document.getElementById('talao');
  if (itens.length > 0){
    talao.classList.add('ativo');
    document.getElementById('talao-total').textContent = formatarKz(total);
  } else {
    talao.classList.remove('ativo');
  }
}

document.getElementById('btn-pedir').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('ativo');
});
document.getElementById('btn-cancelar').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('ativo');
});

document.getElementById('btn-confirmar').addEventListener('click', async () => {
  const nome = document.getElementById('input-nome').value.trim();
  const tel = document.getElementById('input-tel').value.trim();

  if (!nome || !tel){
    mostrarAviso('Preenche o nome e o telefone para continuar.', 'erro');
    return;
  }

  const itens = Object.entries(carrinho).filter(([_, q]) => q > 0);
  const total = itens.reduce((soma, [id, q]) => {
    const produto = produtos.find(p => p.id === id);
    return soma + (produto.preco * q);
  }, 0);

  const btnConfirmar = document.getElementById('btn-confirmar');
  btnConfirmar.textContent = 'A enviar…';
  btnConfirmar.disabled = true;

  try {
    // Uma única chamada segura: cria o pedido, grava os itens
    // e desconta o stock — tudo ou nada, sem passos soltos.
    const itensParaEnviar = itens.map(([id, q]) => ({
      produto_id: id,
      quantidade: q
    }));

    const { error: erroPedido } = await supabase.rpc('criar_pedido', {
      p_vendedor_id: vendedor.id,
      p_nome_cliente: nome,
      p_telefone_cliente: tel,
      p_itens: itensParaEnviar
    });

    if (erroPedido) throw erroPedido;

    // Montar a mensagem do WhatsApp
    let mensagem = `Olá, ${vendedor.nome_loja}! Quero fazer este pedido:\n\n`;
    itens.forEach(([id, q]) => {
      const produto = produtos.find(p => p.id === id);
      mensagem += `• ${q}x ${produto.nome} — ${formatarKz(produto.preco * q)}\n`;
    });
    mensagem += `\n*Total: ${formatarKz(total)}*\n\nNome: ${nome}\nTelefone: ${tel}`;

    const telVendedor = vendedor.telefone_whatsapp.replace(/\D/g, '');
    const link = `https://wa.me/${telVendedor}?text=${encodeURIComponent(mensagem)}`;

    // Abre o WhatsApp à parte e recarrega o catálogo, para o
    // carrinho esvaziar e o stock aparecer já atualizado.
    window.open(link, '_blank');
    setTimeout(() => window.location.reload(), 600);

  } catch (err) {
    console.error(err);
    const mensagemErro = (err.message || '').includes('Stock insuficiente')
      ? 'Já não há stock suficiente para essa quantidade. A página vai atualizar.'
      : 'Não foi possível enviar o pedido. Tenta novamente.';
    mostrarAviso(mensagemErro, 'erro');
    setTimeout(() => window.location.reload(), 300);
  }
});

// ---------- CONSULTAR ESTADO DO PEDIDO ----------
document.getElementById('btn-abrir-consulta').addEventListener('click', () => {
  document.getElementById('overlay-consulta').classList.add('ativa');
});
document.getElementById('btn-cancelar-consulta').addEventListener('click', () => {
  document.getElementById('overlay-consulta').classList.remove('ativa');
});

const nomesStatus = {
  pendente: 'Pendente — ainda não foi confirmado',
  confirmado: 'Confirmado — a preparar',
  entregue: 'Entregue',
  cancelado: 'Cancelado'
};

document.getElementById('btn-consultar').addEventListener('click', async () => {
  const telefone = document.getElementById('input-tel-consulta').value.trim();
  const resultado = document.getElementById('resultado-consulta');
  const btn = document.getElementById('btn-consultar');

  if (!telefone){
    mostrarAviso('Escreve o telefone que usaste no pedido.', 'erro');
    return;
  }

  btn.textContent = 'A procurar…';
  btn.disabled = true;
  resultado.innerHTML = '';

  try {
    const { data, error } = await supabase.rpc('consultar_pedidos_cliente', {
      p_vendedor_id: vendedor.id,
      p_telefone: telefone
    });

    if (error) throw error;

    if (!data || data.length === 0){
      resultado.innerHTML = `<p style="color:var(--text-muted); font-size:13.5px;">Não encontrámos nenhum pedido com esse número.</p>`;
    } else {
      resultado.innerHTML = data.map(p => `
        <div class="pedido-consultado">
          <div class="pedido-consultado-topo">
            <span class="pedido-consultado-data">${new Date(p.criado_em).toLocaleDateString('pt-AO', { day:'numeric', month:'short' })}</span>
            <span class="pedido-consultado-total">${formatarKz(p.total)}</span>
          </div>
          <span class="status-tag status-${p.status}">${nomesStatus[p.status] || p.status}</span>
        </div>
      `).join('');
    }
  } catch (e){
    resultado.innerHTML = `<p style="color:var(--red); font-size:13px;">Erro: ${e.message}</p>`;
  } finally {
    btn.textContent = 'Consultar';
    btn.disabled = false;
  }
});

carregar();

if ('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

</body>
</html>
